<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LU Gallery</title>
<style>
  body {
    font-family: sans-serif;
    background: #f7f7f7;
    margin: 0;
    padding: 0;
  }

  /* Gallery grid */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    padding: 20px;
    max-width: 1200px;
    margin: auto;
  }

  .gallery a img {
    width: 100%;
    display: block;
    transition: transform 0.3s;
    cursor: pointer;
  }

  .gallery a img:hover {
    transform: scale(1.1);
  }

  /* Lightbox overlay */
  .lightbox {
    display: none;
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
  }

  .lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 5px;
  }

  .lightbox:target {
    display: flex;
  }

  /* Close button */
  .close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 30px;
    height: 30px;
    background: #fff;
    text-align: center;
    line-height: 30px;
    font-weight: bold;
    color: #333;
    text-decoration: none;
    border-radius: 50%;
    font-family: sans-serif;
  }
</style>
</head>
